<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: "SF Pro Display", -apple-system, "Inter", system-ui, sans-serif;
    background:
      radial-gradient(120% 90% at 82% -10%, rgba(230,180,90,0.10), transparent 60%),
      radial-gradient(90% 80% at 8% 115%, rgba(127,224,176,0.07), transparent 55%),
      #0e1013;
    color: #f4f1ea;
    overflow: hidden;
    position: relative;
  }
  .grain { position:absolute; inset:0; opacity:.035;
    background-image: repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px); }
  .frame { position: absolute; inset: 0; display: grid;
    grid-template-columns: 1.05fr 0.95fr; align-items: center; }
  .left { padding: 0 0 0 88px; }
  .kicker { font-size: 15px; letter-spacing: .34em; text-transform: uppercase;
    color: #8b8f98; font-weight: 600; margin-bottom: 26px; }
  .word { font-size: 150px; font-weight: 640; letter-spacing: -.045em; line-height: .9;
    background: linear-gradient(180deg,#fbf8f1,#d8d3c7); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; }
  .word .dot { color: #e6b45a; -webkit-text-fill-color: #e6b45a; }
  .tag { font-size: 27px; color: #c8c6bf; margin-top: 22px; font-weight: 420; letter-spacing: -.01em; }
  .chips { display: flex; gap: 12px; margin-top: 40px; }
  .chip { font-size: 15px; color: #b7bcc4; border: 1px solid #2a2e35; border-radius: 999px;
    padding: 8px 16px; background: rgba(255,255,255,0.02); font-weight: 500; }
  .chip b { color: #e6b45a; font-weight: 600; }
  .right { display: flex; justify-content: center; padding-right: 72px; }
  .card { width: 400px; background: #16191e; border: 1px solid #262b32; border-radius: 18px;
    box-shadow: 0 30px 70px rgba(0,0,0,.45); overflow: hidden; }
  .bar { display: flex; gap: 7px; padding: 15px 18px; border-bottom: 1px solid #23272e; }
  .bar i { width: 11px; height: 11px; border-radius: 50%; display:block; }
  .bar .r{background:#ef6a5f}.bar .y{background:#f4bd4f}.bar .g{background:#66c98a}
  .body { padding: 22px 22px 24px; font-family: "SF Mono", ui-monospace, Menlo, monospace; }
  .lbl { font-size: 12px; letter-spacing: .18em; text-transform: uppercase; font-weight: 700; }
  .raw .lbl { color: #7b8089; } .out .lbl { color: #7fe0b0; }
  .txt { font-size: 15.5px; line-height: 1.5; margin: 9px 0 20px; }
  .raw .txt { color: #7b8089; } .raw s { text-decoration: none; color:#5f636b; }
  .out .txt { color: #eef0ec; }
  .out .fix { color: #e6b45a; }
  .arrow { text-align:center; color:#3b4048; font-size: 18px; margin: 2px 0 18px; letter-spacing:.3em;}
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="frame">
    <div class="left">
      <div class="kicker">dictation, polished</div>
      <div class="word">pulido<span class="dot">.</span></div>
      <div class="tag">local, private, bilingual dictation polish</div>
      <div class="chips">
        <div class="chip"><b>100%</b> local</div>
        <div class="chip">no cloud</div>
        <div class="chip">zero deps</div>
        <div class="chip">MIT</div>
      </div>
    </div>
    <div class="right">
      <div class="card">
        <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i></div>
        <div class="body">
          <div class="raw">
            <div class="lbl">raw dictation</div>
            <div class="txt">um so i need the <s>cloud code</s> endpoint este que regrese el status you know</div>
          </div>
          <div class="arrow">→</div>
          <div class="out">
            <div class="lbl">polished</div>
            <div class="txt">I need the <span class="fix">Claude Code</span> endpoint que regrese el status.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
