<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:640px; }
  body {
    font-family:"Space Grotesk", -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(85% 120% at 74% 48%, #0c2b33 0%, #071a20 42%, #050f14 72%, #040b0f 100%);
    color:#f4f1ea; overflow:hidden; position:relative;
  }
  /* GPT-generated gem, off-center right, faded into the bg so there is no hard seam */
  .gem { position:absolute; top:50%; right:-70px; transform:translateY(-50%);
    height:620px; width:auto;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 34%, #000 100%);
            mask-image: linear-gradient(to right, transparent 0%, #000 34%, #000 100%); }
  .veil { position:absolute; inset:0;
    background: linear-gradient(to right, #05121780 0%, #0512170d 46%, transparent 62%); }
  .left { position:absolute; left:84px; top:50%; transform:translateY(-50%); width:660px; z-index:2; }
  .kicker { font-size:14px; letter-spacing:.34em; text-transform:uppercase; color:#b7ecf2;
    font-weight:600; margin-bottom:22px; }
  .word { font-family:"Bricolage Grotesque","Space Grotesk",sans-serif;
    font-size:108px; font-weight:800; letter-spacing:-.04em; line-height:.9;
    background:linear-gradient(180deg,#ffffff,#e2f0ef); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; }
  .word .dot { color:#f4c56a; -webkit-text-fill-color:#f4c56a; }
  .head { font-family:"Bricolage Grotesque","Space Grotesk",sans-serif;
    font-size:35px; font-weight:600; letter-spacing:-.02em; margin-top:20px; color:#f6fbfa; }
  .head b { color:#f4c56a; font-weight:700; }
  .sub { font-size:19px; color:#f2f9f8; margin-top:11px; font-weight:500; }
  .snip { margin-top:26px; font-family:"SF Mono",ui-monospace,Menlo,monospace;
    background:rgba(7,21,26,.82); border:1px solid #2a4c54; border-radius:12px;
    max-width:560px; overflow:hidden; box-shadow:0 18px 40px rgba(0,0,0,.35); }
  .snipbar { display:flex; align-items:center; gap:7px; padding:10px 14px; border-bottom:1px solid #1e3b42;
    background:rgba(255,255,255,.02); }
  .snipbar i { width:10px; height:10px; border-radius:50%; display:block; }
  .snipbar .r1{background:#ef6a5f}.snipbar .y1{background:#f4bd4f}.snipbar .g1{background:#66c98a}
  .snipbar .t { margin-left:9px; font-size:12px; color:#9db6bb; letter-spacing:.02em; }
  .snipbar .st { margin-left:auto; font-size:11.5px; color:#7fe0b0; font-weight:600; }
  .snipbody { padding:14px 17px; font-size:14px; line-height:1.55; }
  .snip .r { color:#9db6bb; } .snip .r s { text-decoration:none; color:#7a9298; }
  .snip .a { color:#5a747b; padding:0 8px; }
  .snip .o { color:#f4faf9; } .snip .o .fix { color:#f0be62; font-weight:600; }
  .chips { display:flex; gap:11px; margin-top:22px; }
  .chip { font-size:14px; color:#eef6f5; border:1px solid #3d6870; border-radius:999px;
    padding:7px 15px; background:rgba(255,255,255,.07); font-weight:700; }
  .chip b { color:#f4c56a; font-weight:800; }
</style>
</head>
<body>
  <img class="gem" src="../hero-banner.png" alt="">
  <div class="veil"></div>
  <div class="left">
    <div class="kicker">dictation, polished</div>
    <div class="word">pulido<span class="dot">.</span></div>
    <div class="head">Speak messy. <b>Paste clean.</b></div>
    <div class="sub">local, private, bilingual dictation polish</div>
    <div class="snip">
      <div class="snipbar"><i class="r1"></i><i class="y1"></i><i class="g1"></i>
        <span class="t">pulido — clean</span><span class="st">polished · 1.1s</span></div>
      <div class="snipbody">
        <div class="r">um so i need the <s>cloud code</s> endpoint este que regrese el status you know</div>
        <div><span class="a">↓</span></div>
        <div class="o">I need the <span class="fix">Claude Code</span> endpoint que regrese el status.</div>
      </div>
    </div>
    <div class="chips">
      <div class="chip"><b>100%</b> local</div>
      <div class="chip">zero deps</div>
      <div class="chip">MIT</div>
    </div>
  </div>
</body>
</html>
